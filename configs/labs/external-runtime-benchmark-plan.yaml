plan_id: external_runtime_lan_baseline_v1
status: local_lab
operator_host: macbook
provider_host: linux_lan
output_root: benchmarks/external-runtime

provider:
  target: lan
  protocol: openai_compatible
  preferred_base_url: http://<linux-lan-ip>:43117/v1
  chat_endpoint: /chat/completions
  model_endpoint: /models
  launch_is_manual: true
  yai_runtime_posture: provider_boundary_observation

hardware_baseline:
  required_commands:
    - uname
    - lscpu
    - free
    - nvidia-smi
  optional_commands:
    - nvcc
    - docker
    - llama-cli
    - llama-server
    - curl

workloads:
  - id: w1-smoke
    prompt: "Rispondi in una frase: provider LAN pronto."
    max_tokens: 64
  - id: w2-technical-summary
    prompt: "Scrivi un riassunto tecnico breve del boundary provider in YAI."
    max_tokens: 256
  - id: w3-long-report
    prompt: "Scrivi un report tecnico breve su YAI, provider LAN e ricevute osservabili."
    max_tokens: 512
  - id: hnsw-synthetic-20k
    kind: hnsw_synthetic
    n: 20000
    dim: 768
    queries: 100
    k: 10
    m: 16
    ef_construction: 100
    ef_search: 64

result_files:
  baseline: baseline.json
  command: command.txt
  stdout: stdout.txt
  stderr: stderr.txt
  gpu_samples: gpu-samples.csv
  summary: summary.json
